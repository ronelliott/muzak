name: Release

on:
  push:
    tags:
      - "v[0-9]*.[0-9]*.[0-9]*"

jobs:

  # ── test ────────────────────────────────────────────────────────────────────

  test:
    name: Test (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

  test-windows:
    name: Test (Windows)
    runs-on: windows-latest
    env:
      CGO_ENABLED: "0"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

  # ── build-darwin-arm64 ──────────────────────────────────────────────────────

  build-darwin-arm64:
    name: Build (darwin/arm64)
    needs: test
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        env:
          GOARCH: arm64
          CGO_ENABLED: "1"
        run: go build -ldflags="-s -w -X main.version=${{ github.ref_name }}" -o muzak-darwin-arm64 ./cmd/

      - name: Package
        run: mv muzak-darwin-arm64 muzak && tar -czf muzak-darwin-arm64.tar.gz muzak

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: muzak-darwin-arm64
          path: muzak-darwin-arm64.tar.gz
          retention-days: 1

  # ── build-darwin-amd64 ──────────────────────────────────────────────────────

  build-darwin-amd64:
    name: Build (darwin/amd64)
    needs: test
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        env:
          GOARCH: amd64
          CGO_ENABLED: "1"
          SDKROOT: /Applications/Xcode.app/Contents/Developer/Platforms/MacOSX.platform/Developer/SDKs/MacOSX.sdk
        run: go build -ldflags="-s -w -X main.version=${{ github.ref_name }}" -o muzak-darwin-amd64 ./cmd/

      - name: Package
        run: mv muzak-darwin-amd64 muzak && tar -czf muzak-darwin-amd64.tar.gz muzak

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: muzak-darwin-amd64
          path: muzak-darwin-amd64.tar.gz
          retention-days: 1

  # ── build-linux-amd64 ───────────────────────────────────────────────────────

  build-linux-amd64:
    name: Build (linux/amd64)
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install ALSA headers
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        env:
          GOARCH: amd64
          CGO_ENABLED: "1"
        run: go build -ldflags="-s -w -X main.version=${{ github.ref_name }}" -o muzak-linux-amd64 ./cmd/

      - name: Package
        run: mv muzak-linux-amd64 muzak && tar -czf muzak-linux-amd64.tar.gz muzak

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: muzak-linux-amd64
          path: muzak-linux-amd64.tar.gz
          retention-days: 1

  # ── build-linux-arm64 ───────────────────────────────────────────────────────

  build-linux-arm64:
    name: Build (linux/arm64)
    needs: test
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: Install ALSA headers
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        env:
          GOARCH: arm64
          CGO_ENABLED: "1"
        run: go build -ldflags="-s -w -X main.version=${{ github.ref_name }}" -o muzak-linux-arm64 ./cmd/

      - name: Package
        run: mv muzak-linux-arm64 muzak && tar -czf muzak-linux-arm64.tar.gz muzak

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: muzak-linux-arm64
          path: muzak-linux-arm64.tar.gz
          retention-days: 1

  # ── build-windows-amd64 ─────────────────────────────────────────────────────

  build-windows-amd64:
    name: Build (windows/amd64)
    needs: [test, test-windows]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        env:
          GOARCH: amd64
          GOOS: windows
          CGO_ENABLED: "0"
        run: go build -ldflags="-s -w -X main.version=${{ github.ref_name }}" -o muzak-windows-amd64.exe ./cmd/

      - name: Package
        run: |
          Move-Item muzak-windows-amd64.exe muzak.exe
          Compress-Archive -Path muzak.exe -DestinationPath muzak-windows-amd64.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: muzak-windows-amd64
          path: muzak-windows-amd64.zip
          retention-days: 1

  # ── build-windows-arm64 ─────────────────────────────────────────────────────
  # Cross-compiled from amd64; no CGO required for Windows.

  build-windows-arm64:
    name: Build (windows/arm64)
    needs: [test, test-windows]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        env:
          GOARCH: arm64
          GOOS: windows
          CGO_ENABLED: "0"
        run: go build -ldflags="-s -w -X main.version=${{ github.ref_name }}" -o muzak-windows-arm64.exe ./cmd/

      - name: Package
        run: |
          Move-Item muzak-windows-arm64.exe muzak.exe
          Compress-Archive -Path muzak.exe -DestinationPath muzak-windows-arm64.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: muzak-windows-arm64
          path: muzak-windows-arm64.zip
          retention-days: 1

  # ── release ─────────────────────────────────────────────────────────────────

  release:
    name: Release
    needs: [build-darwin-arm64, build-darwin-amd64, build-linux-amd64, build-linux-arm64, build-windows-amd64, build-windows-arm64]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download darwin-arm64 tarball
        uses: actions/download-artifact@v4
        with:
          name: muzak-darwin-arm64

      - name: Download darwin-amd64 tarball
        uses: actions/download-artifact@v4
        with:
          name: muzak-darwin-amd64

      - name: Download linux-amd64 tarball
        uses: actions/download-artifact@v4
        with:
          name: muzak-linux-amd64

      - name: Download linux-arm64 tarball
        uses: actions/download-artifact@v4
        with:
          name: muzak-linux-arm64

      - name: Download windows-amd64 zip
        uses: actions/download-artifact@v4
        with:
          name: muzak-windows-amd64

      - name: Download windows-arm64 zip
        uses: actions/download-artifact@v4
        with:
          name: muzak-windows-arm64

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          name: "${{ github.ref_name }}"
          prerelease: false
          generate_release_notes: true
          files: |
            muzak-darwin-arm64.tar.gz
            muzak-darwin-amd64.tar.gz
            muzak-linux-amd64.tar.gz
            muzak-linux-arm64.tar.gz
            muzak-windows-amd64.zip
            muzak-windows-arm64.zip

  # ── update-tap ──────────────────────────────────────────────────────────────
  # Computes SHA256 of macOS/Linux tarballs and pushes an updated formula.
  # Windows is not distributed via Homebrew.

  update-tap:
    name: Update Homebrew Tap
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Download tarballs
        run: |
          for target in darwin-arm64 darwin-amd64 linux-amd64 linux-arm64; do
            curl --retry 5 --retry-delay 5 -fsSL \
              "https://github.com/ronelliott/muzak/releases/download/${{ github.ref_name }}/muzak-${target}.tar.gz" \
              -o "muzak-${target}.tar.gz"
          done

      - name: Compute SHA256s
        id: sha
        run: |
          echo "darwin_arm64=$(sha256sum muzak-darwin-arm64.tar.gz | awk '{print $1}')" >> "$GITHUB_OUTPUT"
          echo "darwin_amd64=$(sha256sum muzak-darwin-amd64.tar.gz | awk '{print $1}')" >> "$GITHUB_OUTPUT"
          echo "linux_amd64=$(sha256sum muzak-linux-amd64.tar.gz | awk '{print $1}')"   >> "$GITHUB_OUTPUT"
          echo "linux_arm64=$(sha256sum muzak-linux-arm64.tar.gz | awk '{print $1}')"   >> "$GITHUB_OUTPUT"

      - name: Clone tap repo
        uses: actions/checkout@v4
        with:
          repository: ronelliott/homebrew-muzak
          token: ${{ secrets.TAP_GITHUB_TOKEN }}
          path: tap

      - name: Write formula
        env:
          VERSION: ${{ github.ref_name }}
          SHA_DARWIN_ARM64: ${{ steps.sha.outputs.darwin_arm64 }}
          SHA_DARWIN_AMD64: ${{ steps.sha.outputs.darwin_amd64 }}
          SHA_LINUX_AMD64: ${{ steps.sha.outputs.linux_amd64 }}
          SHA_LINUX_ARM64: ${{ steps.sha.outputs.linux_arm64 }}
        run: |
          VERSION_NUM="${VERSION#v}"
          cat > tap/Formula/muzak.rb <<EOF
          class Muzak < Formula
            desc "Minimalist terminal-based music player"
            homepage "https://github.com/ronelliott/muzak"
            version "${VERSION_NUM}"
            license "MIT"

            on_macos do
              on_arm do
                url "https://github.com/ronelliott/muzak/releases/download/${VERSION}/muzak-darwin-arm64.tar.gz"
                sha256 "${SHA_DARWIN_ARM64}"
              end

              on_intel do
                url "https://github.com/ronelliott/muzak/releases/download/${VERSION}/muzak-darwin-amd64.tar.gz"
                sha256 "${SHA_DARWIN_AMD64}"
              end
            end

            on_linux do
              depends_on "alsa-lib"

              on_intel do
                url "https://github.com/ronelliott/muzak/releases/download/${VERSION}/muzak-linux-amd64.tar.gz"
                sha256 "${SHA_LINUX_AMD64}"
              end

              on_arm do
                url "https://github.com/ronelliott/muzak/releases/download/${VERSION}/muzak-linux-arm64.tar.gz"
                sha256 "${SHA_LINUX_ARM64}"
              end
            end

            def install
              bin.install "muzak"
              chmod 0555, bin/"muzak"
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/muzak --version")
            end
          end
          EOF

      - name: Commit and push
        env:
          GH_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
        run: |
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/muzak.rb
          git diff --staged --quiet || git commit -m "chore: update muzak to ${{ github.ref_name }}"
          git push
