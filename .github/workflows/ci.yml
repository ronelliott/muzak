name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  # ── test-macos ───────────────────────────────────────────────────────────────
  # Runs on every push and every PR targeting main.

  test-macos:
    name: Test (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

  # ── test-linux ───────────────────────────────────────────────────────────────

  test-linux:
    name: Test (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install ALSA headers
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

  # ── build-darwin-arm64 ──────────────────────────────────────────────────────
  # Native build for Apple Silicon. Only runs when merging into main.

  build-darwin-arm64:
    name: Build (darwin/arm64)
    needs: [test-macos, test-linux]
    if: github.event_name == 'push'
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        env:
          GOARCH: arm64
          CGO_ENABLED: "1"
        run: go build -ldflags="-s -w -X main.version=${{ github.sha }}" -o muzak-darwin-arm64 ./cmd/

      - name: Package
        run: mv muzak-darwin-arm64 muzak && tar -czf muzak-darwin-arm64.tar.gz muzak

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: muzak-darwin-arm64
          path: muzak-darwin-arm64.tar.gz
          retention-days: 1

  # ── build-darwin-amd64 ──────────────────────────────────────────────────────
  # Native build for Intel Macs. Only runs when merging into main.

  build-darwin-amd64:
    name: Build (darwin/amd64)
    needs: [test-macos, test-linux]
    if: github.event_name == 'push'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        env:
          GOARCH: amd64
          CGO_ENABLED: "1"
          SDKROOT: /Applications/Xcode.app/Contents/Developer/Platforms/MacOSX.platform/Developer/SDKs/MacOSX.sdk
        run: go build -ldflags="-s -w -X main.version=${{ github.sha }}" -o muzak-darwin-amd64 ./cmd/

      - name: Package
        run: mv muzak-darwin-amd64 muzak && tar -czf muzak-darwin-amd64.tar.gz muzak

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: muzak-darwin-amd64
          path: muzak-darwin-amd64.tar.gz
          retention-days: 1

  # ── build-linux-amd64 ───────────────────────────────────────────────────────

  build-linux-amd64:
    name: Build (linux/amd64)
    needs: [test-macos, test-linux]
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install ALSA headers
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        env:
          GOARCH: amd64
          CGO_ENABLED: "1"
        run: go build -ldflags="-s -w -X main.version=${{ github.sha }}" -o muzak-linux-amd64 ./cmd/

      - name: Package
        run: mv muzak-linux-amd64 muzak && tar -czf muzak-linux-amd64.tar.gz muzak

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: muzak-linux-amd64
          path: muzak-linux-amd64.tar.gz
          retention-days: 1

  # ── build-linux-arm64 ───────────────────────────────────────────────────────

  build-linux-arm64:
    name: Build (linux/arm64)
    needs: [test-macos, test-linux]
    if: github.event_name == 'push'
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: Install ALSA headers
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        env:
          GOARCH: arm64
          CGO_ENABLED: "1"
        run: go build -ldflags="-s -w -X main.version=${{ github.sha }}" -o muzak-linux-arm64 ./cmd/

      - name: Package
        run: mv muzak-linux-arm64 muzak && tar -czf muzak-linux-arm64.tar.gz muzak

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: muzak-linux-arm64
          path: muzak-linux-arm64.tar.gz
          retention-days: 1

  # ── release ─────────────────────────────────────────────────────────────────
  # Downloads all tarballs and creates or overwrites the rolling "latest" pre-release.

  release:
    name: Release
    needs: [build-darwin-arm64, build-darwin-amd64, build-linux-amd64, build-linux-arm64]
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download darwin-arm64 tarball
        uses: actions/download-artifact@v4
        with:
          name: muzak-darwin-arm64

      - name: Download darwin-amd64 tarball
        uses: actions/download-artifact@v4
        with:
          name: muzak-darwin-amd64

      - name: Download linux-amd64 tarball
        uses: actions/download-artifact@v4
        with:
          name: muzak-linux-amd64

      - name: Download linux-arm64 tarball
        uses: actions/download-artifact@v4
        with:
          name: muzak-linux-arm64

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Latest build"
          prerelease: true
          body: |
            Rolling release — updated on every push to `main`.

            **Commit:** ${{ github.sha }}
            **Date:** ${{ github.event.head_commit.timestamp }}

            > **Note:** Linux binaries are tested via automated CI only and have not been verified on actual hardware.

            | Tarball | Platform | Architecture |
            |---------|----------|-------------|
            | `muzak-darwin-arm64.tar.gz` | macOS | Apple Silicon (M1/M2/M3/M4) |
            | `muzak-darwin-amd64.tar.gz` | macOS | Intel |
            | `muzak-linux-amd64.tar.gz` | Linux | x86-64 |
            | `muzak-linux-arm64.tar.gz` | Linux | ARM64 |
          files: |
            muzak-darwin-arm64.tar.gz
            muzak-darwin-amd64.tar.gz
            muzak-linux-amd64.tar.gz
            muzak-linux-arm64.tar.gz
